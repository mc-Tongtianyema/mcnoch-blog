<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mcnoch-blog 搜索</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lunr.js/2.3.9/lunr.min.js"></script>
</head>
<body>
    <div class="header">
        <h1>mcnoch-blog 搜索</h1>
    </div>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="输入关键词搜索博客文章...">
        <button onclick="searchBlog()" class="search-button">搜索</button>
        <div id="results" class="results"></div>
    </div>

    <script>
        // 加载搜索索引
        let index = null;
        let data = []; // 用于存储从JSON文件中加载的数据
        fetch('search_index.json')
            .then(response => response.json())
            .then(dataLoaded => {
                data = dataLoaded; // 保存加载的数据
                index = lunr(function () {
                    this.field('title', { boost: 10 });
                    this.field('content');
                    this.ref('link');
                });

                data.forEach(function (doc) {
                    index.add(doc);
                });
            });

        // 搜索功能
        function searchBlog() {
            const query = document.getElementById('search-input').value;
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = ''; // 清空之前的搜索结果

            if (index) {
                const results = index.search(query);
                if (results.length === 0) {
                    resultsDiv.innerHTML = '<p>没有找到相关结果</p>';
                } else {
                    results.forEach(result => {
                        const doc = data.find(item => item.link === result.ref);
                        const resultItem = document.createElement('div');
                        resultItem.classList.add('result-item');
                        resultItem.innerHTML = `<a href="${doc.link}" target="_blank">${doc.title}</a>`;
                        resultsDiv.appendChild(resultItem);
                    });
                }
            }
        }
    </script>
</body>
</html>
