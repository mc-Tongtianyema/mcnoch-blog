
<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mc_noch搜索 - 您的搜索从这里开始</title>
    <link rel="icon" type="logo" href="https://tu.wxhfywy.cn/i/250819/68a42bb82e29b.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon-wrapper">
                <i class="fas fa-search logo-icon"></i>
            </div>
            <h1 class="logo-text">mc_noch搜索</h1>
        </div>
        <p class="tagline">一站式多平台搜索，快速获取您需要的信息</p>
        
        <div class="search-container">
            <div class="search-header">
                <h2 class="search-title">全网搜索</h2>
                
            </div>
            
            <div class="search-form" id="searchForm">
                <div class="search-row">
                    <div class="search-select">
                        <select id="searchEngine">
                            <option value="https://www.bing.com/search?q=" selected><i class="fab fa-bing"></i> Bing</option>
                            <option value="https://www.google.com/search?q="><i class="fab fa-google"></i> Google</option>
                            <option value="https://www.baidu.com/s?wd="><i class="fab fa-baidu"></i> 百度</option>
                            <option value="https://www.so.com/s?q="><i class="fab fa-360"></i> 360搜索</option>
                            <option value="https://metaso.cn/?q="><i class="fab fa-douyin"></i> 秘塔AI</option>
                            <option value="https://www.sogou.com/web?query="><i class="fab fa-sogou"></i> 搜狗</option>
                            <option value="https://search.bilibili.com/all?keyword="><i class="fab fa-bilibili"></i> 哔哩哔哩</option>
                            <option value="https://tieba.baidu.com/f?ie=utf-8&kw="><i class="fab fa-bilibili"></i>百度贴吧</option>
                            <option value="https://www.zhihu.com/search?type=content&q="><i class="fab fa-zhihu"></i> 知乎</option>
                            <option value="https://github.com/search?q="><i class="fab fa-github"></i> GitHub</option>
                            <option value="https://www.kuaishou.com/search/video?searchKey="><i class="fab fa-kuaishou"></i> 快手</option>
                            <option value="https://www.douyin.com/root/search/"><i class="fab fa-douyin"></i> 抖音</option>
                        </select>
                    </div>
                    
                    <div class="search-input-container">
                        <input type="text" id="searchQuery" placeholder="请输入搜索内容">
                        <span class="clear-btn" id="clearInput">&times;</span>
                        <div class="search-icon">
                            <i class="fas fa-search"></i>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="search-btn" id="searchButton">
                    <span class="loader" id="loader"></span>
                    <span>开始搜索</span>
                </button>
                
                <div class="quick-searches">
                    <div class="quick-search" data-query="今日新闻">
                        <i class="fas fa-newspaper"></i>
                        <span>今日新闻</span>
                    </div>
                    <div class="quick-search" data-query="天气预报">
                        <i class="fas fa-cloud-sun"></i>
                        <span>天气预报</span>
                    </div>
                    <div class="quick-search" data-query="最新电影">
                        <i class="fas fa-film"></i>
                        <span>最新电影</span>
                    </div>
                    <div class="quick-search" data-query="科技资讯">
                        <i class="fas fa-microchip"></i>
                        <span>科技资讯</span>
                    </div>
                 
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
<p>浙ICP备2024115105号-6</p>
</html>
