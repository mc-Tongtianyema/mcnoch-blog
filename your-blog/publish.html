<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>mc_noch的博客 · 发布页</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
    :root{
        --accent:#0066ff;
        --bg:#f5f7fa;
        --radius:6px;
        --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC",sans-serif;
    }
    body{margin:0;padding:2rem;font-family:var(--font);background:var(--bg);color:#222}
    h1{margin-top:0}
    form{max-width:720px;margin:auto;background:#fff;padding:2rem;border-radius:var(--radius);box-shadow:0 2px 8px rgba(0,0,0,.05)}
    label{display:block;margin:.75rem 0 .25rem;font-weight:600;font-size:.9rem}
    input,textarea,select{width:100%;padding:.6rem;border:1px solid #ccd1d9;border-radius:var(--radius);font-size:1rem;font-family:var(--font)}
    textarea{min-height:200px;resize:vertical}
    。actions{display:flex;gap:.75rem;margin-top:1.5rem}
    button{cursor:pointer;background:var(--accent);color:#fff;border:0;padding:.6rem 1.2rem;border-radius:var(--radius);font-size:1rem}
    button[type=button]{background:#888}
    #msg{margin-top:1rem;font-size:.9rem;color:green}
    。hidden{display:none}
</style>
</head>

<body>
<h1>发布新文章</h1>

<form id="publishForm">
    <label>文章标题 *</label>
    <input type="text" id="title" required>

    <label>作者</label>
    <input type="text" id="author" placeholder="可选">

    <label>标签（逗号分隔）</label>
    <input type="text" id="tags" placeholder="例如: 前端, 教程">

    <label>正文 Markdown *</label>
    <textarea id="content" required placeholder="支持标准 Markdown 语法"></textarea>

    <label>摘要</label>
    <textarea id="summary" rows="3" placeholder="不填将自动截取前 120 字"></textarea>

    <div class="actions">
        <button type="submit">保存并下载 JSON</button>
        <button type="button" id="previewBtn">预览渲染</button>
        <button type="button" id="publishBtn">发布到首页</button>
    </div>
    <p id="msg" class="hidden"></p>
</form>

<!-- 可选：预览区域 -->
<div id="previewArea" class="hidden" style="max-width:720px;margin:2rem auto;background:#fff;padding:2rem;border-radius:var(--radius);"></div>

<!-- 引入 marked 解析 Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
/* ========== 工具函数 ========== */
const $ = sel => document.querySelector(sel);
const msg = (text, ok = true) => {
    const el = $('#msg');
    el.textContent = text;
    el.style.color = ok ? 'green' : 'crimson';
    el.classList.remove('hidden');
};

/* ========== 保存为 JSON ========== */
$('#publishForm').addEventListener('submit', e => {
    e.preventDefault();
    const data = {
        title: $('#title').value.trim(),
        author: $('#author').value.trim() || '匿名',
        tags: $('#tags').value.split(',').map(t => t.trim()).filter(Boolean),
        summary: $('#summary').value.trim(),
        content: $('#content').value.trim(),
        createdAt: new Date().toISOString()
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${Date.now()}.json`;
    a.click();
    msg('已下载 JSON 文件！');
});

/* ========== 预览 ========== */
$('#previewBtn').addEventListener('click', () => {
    const md = $('#content').value;
    if (!md) return msg('请先输入正文！', false);
    $('#previewArea').innerHTML = marked.parse(md);
    $('#previewArea').classList.remove('hidden');
    msg('预览已生成，滚动查看');
});

/* ========== 发布到首页 ========== */
$('#publishBtn').addEventListener('click', async () => {
    const title = $('#title').value.trim();
    const md = $('#content').value.trim();
    if (!title || !md) return msg('标题与正文不能为空！', false);

    /* 1. 获取或创建首页 index.html */
    let indexHtml;
    try {
        const res = await fetch('index.html');
        if (res.ok) {
            indexHtml = await res.text();
        } else {
            throw new Error('404');
        }
    } catch {
        // index.html 不存在，新建骨架
        indexHtml = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>我的博客</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
    body{margin:2rem auto;max-width:800px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC",sans-serif;line-height:1.6;color:#222}
    h1{text-align:center}
    article{margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid #eee}
    h2{margin:.5rem 0}
    .meta{color:#666;font-size:.9rem}
    footer{text-align:center;font-size:.8rem;color:#999}
</style>
</head>
<body>
<h1>mc_noch的博客</h1>
<section id="posts"></section>
<footer>Powered by mc_noch blog发布页</footer>
</body>
</html>`;
    }

    /* 2. 组装新文章 HTML */
    const slug = title.replace(/\s+/g, '-').replace(/[^a-zA-Z0-9\u4e00-\u9fa5\-]/g, '').toLowerCase();
    const summary = $('#summary').value.trim() || md.slice(0, 120) + '…';
    const article = `
<article id="${slug}">
    <h2><a href="#${slug}">${title}</a></h2>
    <p class="meta">
        作者：${$('#author').value || '匿名'} · 
        时间：${new Date().toLocaleString()} · 
        标签：${$('#tags').value || '无'}
    </p>
    <p>${summary}</p>
    <div>${marked.parse(md)}</div>
</article>`;

    /* 3. 插入到 #posts 标签之前 */
    const marker = '<section id="posts">';
    const pos = indexHtml.indexOf(marker);
    if (pos === -1) return msg('首页格式异常，无法插入！', false);
    const newIndex = indexHtml.slice(0, pos + marker.length) + article + indexHtml.slice(pos + marker.length);

    /* 4. 触发下载新的 index.html */
    const blob = new Blob([newIndex], {type: 'text/html'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'index.html';
    a.click();
    msg('已生成新的 index.html，请覆盖同名文件后刷新首页！');
});
</script>
</body>
</html>
