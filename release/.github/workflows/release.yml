name: Build Release Index

于:
  push:
    paths: ['release/files/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Generate release.json
      run: |
        cd release
        echo '[' > release.json
        first=1
        for f in files/*; do
          [[ "$f" == "files/*" ]] && continue  # 空目录
          name=$(basename "$f")
          size=$(stat -c%s "$f")
          # GitHub Pages 直链（已换成你的用户名）
          url="https://mc-tongtianyema.github.io/mcnoch-blog/release/files/$name"
          [[ $first -eq 0 ]] && echo ',' >> release.json || first=0
          printf '{"name":"%s","size":%d,"url":"%s"}' "$name" "$size" "$url" >> release.json
        done
        echo ']' >> release.json

    - name: Commit & push
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add release/release.json
        git diff --cached --quiet || (git commit -m "chore: update release index" && git push)
